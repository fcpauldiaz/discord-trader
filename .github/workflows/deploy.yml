name: Deploy

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm install
      - run: npm run generate-routes
      - run: npm run build
      - name: Deploy placeholder
        run: echo "Upload dist/ to your static host and set VITE_RECEIVER_API_URL."
